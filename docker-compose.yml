services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
    volumes:
      - translation-data:/data
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
    volumes:
      - translation-data:/data
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - api

  tests:
    build: ./backend
    command: pytest -v
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/tmp/test-data
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - test

volumes:
  translation-data:
  redis-data:
