services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATA_DIR=/data
    volumes:
      - translation-data:/data

  frontend:
    build: ./frontend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/svelte.config.js:/app/svelte.config.js
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - api

  tests:
    build: ./backend
    command: pytest -v
    env_file: .env
    environment:
      - DATA_DIR=/tmp/test-data
    profiles:
      - test

volumes:
  translation-data:
